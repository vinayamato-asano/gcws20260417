<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポモドーロタイマー</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="window-frame">
        <div class="title-bar">
            <span class="title-text">ポモドーロタイマー</span>
            <div class="window-controls">
                <span class="win-btn">－</span>
                <span class="win-btn">□</span>
                <span class="win-btn">×</span>
            </div>
        </div>
        <div class="container">
            <div class="status-label" id="status-label">停止中</div>
            <div class="progress-ring-container">
                <svg class="progress-ring" width="220" height="220" viewBox="0 0 220 220" aria-hidden="true">
                    <circle class="progress-ring__track" cx="110" cy="110" r="90" />
                    <circle class="progress-ring__bar" id="progress-bar" cx="110" cy="110" r="90" />
                </svg>
                <div class="timer-display" id="timer-display" aria-live="polite" aria-label="残り時間">25:00</div>
            </div>
            <div class="button-group">
                <button id="start-btn">開始</button>
                <button id="reset-btn">リセット</button>
            </div>
            <div class="progress-section">
                <div class="progress-title">今日の進捗</div>
                <div class="progress-stats">
                    <div class="stat">
                        <span class="stat-value" id="complete-count">0</span>
                        <span class="stat-label">完了</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value highlight" id="focus-time">0分</span>
                        <span class="stat-label">集中時間</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/js/timer_logic.js"></script>
    <script src="/static/js/timer.js"></script>
</body>
</html>
